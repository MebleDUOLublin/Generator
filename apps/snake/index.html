<!-- WINDOW: Neon Snake -->
<div
  class="window"
  id="window-snake"
  role="dialog"
  aria-labelledby="window-snake-title"
  style="top: 120px; left: 250px; width: 640px; height: 520px"
>
  <div class="window-header">
    <div class="window-title">
      <span class="window-title-icon">🐍</span>
      <span id="window-snake-title">Neon Snake</span>
    </div>
    <div class="window-controls">
      <button
        class="window-control-btn minimize"
        data-action="minimize"
        aria-label="Minimalizuj"
      >
        −
      </button>
      <button
        class="window-control-btn maximize"
        data-action="maximize"
        aria-label="Maksymalizuj"
      >
        □
      </button>
      <button
        class="window-control-btn close"
        data-action="close"
        aria-label="Zamknij"
      >
        ✕
      </button>
    </div>
  </div>
  <div
    class="window-content"
    style="padding: 0; overflow: hidden; background: #0f172a"
  >
    <canvas id="snakeCanvas"></canvas>
  </div>
</div>
