<!-- WINDOW: Zamówienie Domator -->
<div
  class="window"
  id="window-domator"
  role="dialog"
  aria-labelledby="window-domator-title"
  style="top: 60px; left: 120px; width: 85vw; height: 80vh"
>
  <div class="window-header">
    <div class="window-title">
      <span class="window-title-icon">🚚</span>
      <span id="window-domator-title">Generator Zamówień Domator</span>
    </div>
    <div class="window-controls">
      <button
        class="window-control-btn minimize"
        data-action="minimize"
        aria-label="Minimalizuj"
      >
        −
      </button>
      <button
        class="window-control-btn maximize"
        data-action="maximize"
        aria-label="Maksymalizuj"
      >
        □
      </button>
      <button
        class="window-control-btn close"
        data-action="close"
        aria-label="Zamknij"
      >
        ✕
      </button>
    </div>
  </div>
  <div class="window-content domator-container" id="domator-app">
    <div class="domator-card">
      <div class="domator-header">
        <h2>
          <span>🪑</span>
          Generator Zamówień Domator
        </h2>
        <div class="domator-actions">
          <button class="btn btn-outline" id="loadDomatorTemplateBtn">
            <span>📋</span> Szablon
          </button>
        </div>
      </div>

      <div class="domator-content">
        <!-- STATYSTYKI -->
        <div class="domator-stats">
          <div class="stat-card">
            <div class="stat-label">Produktów</div>
            <div class="stat-value" id="domatorProductCount">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Suma Netto</div>
            <div class="stat-value" id="domatorSumNetto">0,00 zł</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Suma Brutto</div>
            <div class="stat-value" id="domatorSumBrutto">0,00 zł</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Status</div>
            <div class="stat-value" id="domatorStatus">📝 Edycja</div>
          </div>
        </div>

        <!-- PASEK NARZĘDZI -->
        <div class="domator-toolbar">
          <button class="btn btn-secondary" id="domatorExportEmailBtn">
            <span>✉️</span> Eksport do maila
          </button>
          <button class="btn btn-secondary" id="domatorExportPdfBtn">
            <span>📄</span> Generuj PDF
          </button>
          <button class="btn btn-secondary" id="domatorCopyHtmlBtn">
            <span>📋</span> Kopiuj HTML
          </button>
          <button class="btn btn-secondary" id="domatorSaveBtn">
            <span>💾</span> Zapisz
          </button>
          <button class="btn btn-danger" id="domatorClearBtn">
            <span>🗑️</span> Wyczyść
          </button>
        </div>

        <!-- DANE ADRESOWE -->
        <div class="domator-section">
          <h3 class="domator-section-title">
            <span>📍</span>
            Adres dostawy
          </h3>
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">Nazwa / Imię i Nazwisko</label>
              <input type="text" class="form-input" id="domatorClientName" />
            </div>
            <div class="form-group">
              <label class="form-label">Ulica z numerem</label>
              <input type="text" class="form-input" id="domatorStreet" />
            </div>
            <div class="form-group">
              <label class="form-label">Kod pocztowy</label>
              <input type="text" class="form-input" id="domatorPostCode" />
            </div>
            <div class="form-group">
              <label class="form-label">Miasto</label>
              <input type="text" class="form-input" id="domatorCity" />
            </div>
            <div class="form-group">
              <label class="form-label">Numer telefonu</label>
              <input type="tel" class="form-input" id="domatorPhone" />
            </div>
            <div class="form-group">
              <label class="form-label">Adres mailowy</label>
              <input type="email" class="form-input" id="domatorEmail" />
            </div>
          </div>
        </div>

        <!-- LISTA PRODUKTÓW -->
        <div class="domator-section">
          <h3 class="domator-section-title">
            <span>📦</span>
            Lista produktów
            <button
              class="btn btn-success"
              id="addDomatorProductBtn"
              style="margin-left: auto"
            >
              <span>➕</span> Dodaj produkt
            </button>
          </h3>
          <table class="domator-table" id="domatorProductsTable">
            <thead>
              <tr>
                <th style="width: 40px; text-align: center">#</th>
                <th style="min-width: 120px">SKU</th>
                <th style="min-width: 120px">EAN</th>
                <th style="min-width: 250px">Nazwa produktu</th>
                <th style="width: 80px; text-align: center">Ilość</th>
                <th style="min-width: 120px; text-align: right">Cena netto</th>
                <th style="min-width: 130px; text-align: right">Cena brutto</th>
                <th style="width: 80px; text-align: center">Akcje</th>
              </tr>
            </thead>
            <tbody id="domatorProductsBody">
              <!-- Produkty będą dodawane dynamicznie -->
            </tbody>
            <tfoot>
              <tr style="background: #f3f4f6; font-weight: 600">
                <td colspan="5" style="text-align: right">SUMA:</td>
                <td style="text-align: right" id="domatorTotalNetto">
                  0,00 zł
                </td>
                <td style="text-align: right" id="domatorTotalBrutto">
                  0,00 zł
                </td>
                <td></td>
              </tr>
            </tfoot>
          </table>
        </div>

        <!-- DODATKOWE INFORMACJE -->
        <div class="domator-section">
          <h3 class="domator-section-title">
            <span>📝</span>
            Dodatkowe informacje
          </h3>
          <textarea
            id="domatorNotes"
            class="form-textarea"
            rows="3"
            placeholder="Uwagi do zamówienia, specjalne instrukcje dostawy..."
          ></textarea>
        </div>
      </div>
    </div>
  </div>
</div>
